<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Real-Time Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { 
            background: linear-gradient(135deg, #128c7e 0%, #075e54 100%);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 20px;
        }
        .signup-card { 
            background: white; padding: 40px; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            width: 100%; max-width: 450px; text-align: center;
            animation: slideUp 0.6s ease-out;
        }
        h2 { color: #075e54; font-weight: 600; margin-bottom: 5px; }
        p.tagline { color: #666; font-size: 0.9rem; margin-bottom: 25px; }
        
        form p { text-align: left; margin-bottom: 12px; }
        label { font-size: 0.8rem; font-weight: 600; color: #444; }
        
        input { 
            width: 100%; padding: 12px 16px; margin-top: 5px;
            border: 2px solid #eee; border-radius: 10px; font-size: 0.9rem; 
            outline: none; transition: 0.3s;
        }
        input:focus { border-color: #128c7e; }

        /* Hiding/Cleaning Django's bulky help text */
        .helptext { display: block; font-size: 0.7rem; color: #999; margin-top: 4px; line-height: 1.3; }
        ul { list-style: none; margin-top: 5px; }
        ul li { font-size: 0.7rem; color: #777; }

        button { 
            width: 100%; padding: 14px; margin-top: 20px;
            background: #075e54; color: white; border: none; 
            border-radius: 10px; font-size: 1rem; font-weight: 600; 
            cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #128c7e; transform: translateY(-2px); }
        
        .footer { margin-top: 20px; font-size: 0.85rem; color: #777; border-top: 1px solid #f0f0f0; padding-top: 15px; }
        .footer a { color: #075e54; text-decoration: none; font-weight: 600; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="signup-card">
        <h2>Join Us</h2>
        <p class="tagline">Create an account to start chatting</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Create Account</button>
        </form>
        <div class="footer">
            Already have an account? <a href="{% url 'login' %}">Log In</a>
        </div>
    </div>
</body>
</html>
