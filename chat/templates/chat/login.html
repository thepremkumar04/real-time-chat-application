<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Real-Time Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { 
            background: linear-gradient(135deg, #075e54 0%, #128c7e 100%);
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden;
        }
        .login-card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            padding: 40px; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            width: 100%; max-width: 400px; text-align: center;
            animation: slideUp 0.6s ease-out;
        }
        h2 { color: #075e54; font-weight: 600; margin-bottom: 8px; font-size: 1.8rem; }
        p.tagline { color: #666; font-size: 0.9rem; margin-bottom: 30px; }
        
        form p { text-align: left; margin-bottom: 15px; }
        label { font-size: 0.85rem; font-weight: 600; color: #444; margin-left: 5px; }
        
        input { 
            width: 100%; padding: 14px 18px; margin-top: 6px;
            border: 2px solid #eee; border-radius: 12px; 
            font-size: 1rem; transition: all 0.3s ease; outline: none;
        }
        input:focus { border-color: #128c7e; background: #f9f9f9; }

        button { 
            width: 100%; padding: 14px; margin-top: 15px;
            background: #075e54; color: white; border: none; 
            border-radius: 12px; font-size: 1rem; font-weight: 600; 
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(7, 94, 84, 0.3);
        }
        button:hover { background: #128c7e; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(18, 140, 126, 0.4); }
        
        .footer { margin-top: 25px; font-size: 0.9rem; color: #777; }
        .footer a { color: #075e54; text-decoration: none; font-weight: 600; }
        .footer a:hover { text-decoration: underline; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Welcome Back</h2>
        <p class="tagline">Login to start chatting</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
        </form>
        <div class="footer">
            New here? <a href="{% url 'signup' %}">Create account</a>
        </div>
    </div>
</body>
</html>
